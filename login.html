<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasik Saji - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="page-wrapper">

    <!--  LEFT PANEL  -->
    <div class="left-panel">

        <!-- Stripe background -->
        <div class="stripes"></div>

        <!-- DAUN DEKORASI (pure CSS + SVG inline) -->
        <svg class="leaf leaf-1" viewBox="0 0 60 90" xmlns="http://www.w3.org/2000/svg">
            <path d="M30 85 C10 60, 0 35, 15 10 C20 2, 40 2, 45 10 C60 35, 50 60, 30 85Z" fill="#4caf50"/>
            <path d="M30 85 C30 60, 30 35, 30 10" stroke="#2e7d32" stroke-width="1.5" fill="none"/>
            <path d="M30 60 C22 50, 15 42, 20 30" stroke="#2e7d32" stroke-width="1" fill="none"/>
            <path d="M30 60 C38 50, 45 42, 40 30" stroke="#2e7d32" stroke-width="1" fill="none"/>
        </svg>

        <svg class="leaf leaf-2" viewBox="0 0 50 75" xmlns="http://www.w3.org/2000/svg">
            <path d="M25 70 C8 50, 0 28, 12 8 C17 1, 33 1, 38 8 C50 28, 42 50, 25 70Z" fill="#66bb6a"/>
            <path d="M25 70 C25 50, 25 28, 25 8" stroke="#388e3c" stroke-width="1.2" fill="none"/>
        </svg>

        <svg class="leaf leaf-3" viewBox="0 0 55 80" xmlns="http://www.w3.org/2000/svg">
            <path d="M27 76 C5 55, 0 30, 14 8 C19 0, 36 0, 41 8 C55 30, 50 55, 27 76Z" fill="#43a047"/>
            <path d="M27 76 C27 55, 27 30, 27 8" stroke="#1b5e20" stroke-width="1.5" fill="none"/>
            <path d="M27 55 C18 44, 10 36, 16 22" stroke="#1b5e20" stroke-width="1" fill="none"/>
            <path d="M27 55 C36 44, 44 36, 38 22" stroke="#1b5e20" stroke-width="1" fill="none"/>
        </svg>

        <svg class="leaf leaf-4" viewBox="0 0 45 68" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 64 C6 46, 0 25, 10 7 C14 1, 31 1, 35 7 C45 25, 39 46, 22 64Z" fill="#81c784"/>
            <path d="M22 64 C22 46, 22 25, 22 7" stroke="#388e3c" stroke-width="1.2" fill="none"/>
        </svg>

        <svg class="leaf leaf-5" viewBox="0 0 52 78" xmlns="http://www.w3.org/2000/svg">
            <path d="M26 74 C7 53, 0 29, 13 8 C18 0, 34 0, 39 8 C52 29, 45 53, 26 74Z" fill="#4caf50"/>
            <path d="M26 74 C26 53, 26 29, 26 8" stroke="#2e7d32" stroke-width="1.5" fill="none"/>
        </svg>

        <svg class="leaf leaf-6" viewBox="0 0 48 72" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 68 C7 49, 0 26, 11 7 C16 0, 32 0, 37 7 C48 26, 41 49, 24 68Z" fill="#66bb6a"/>
            <path d="M24 68 C24 49, 24 26, 24 7" stroke="#2e7d32" stroke-width="1.2" fill="none"/>
            <path d="M24 50 C16 40, 9 32, 14 18" stroke="#2e7d32" stroke-width="1" fill="none"/>
            <path d="M24 50 C32 40, 39 32, 34 18" stroke="#2e7d32" stroke-width="1" fill="none"/>
        </svg>

        <div class="sprinkles-wrap">
            <span class="sp sp-a"></span>
            <span class="sp sp-b"></span>
            <span class="sp sp-c"></span>
            <span class="sp sp-d"></span>
            <span class="sp sp-e"></span>
            <span class="sp sp-f"></span>
            <span class="sp sp-g"></span>
            <span class="sp sp-h"></span>
        </div>

        <!-- Teks kiri -->
        <div class="left-content">
            <h1 class="brand-title">Gabung di Tasik Saji</h1>
            <p class="brand-desc">
                Login untuk melanjutkan pesan makanan favorit
                dan booking tempat makan dengan mudah, cepat,
                dan praktis.
            </p>
        </div>

        <div class="food-illustration">
            <img src="image/sate animasi.png" alt="Sate Tasik Saji" class="food-img">
        </div>

        <!-- Bukit hijau pojok kiri bawah -->
        <div class="green-hill"></div>

    </div>

    <!--  RIGHT PANEL  -->
    <div class="right-panel">
        <div class="login-box">

            <h2 class="login-title">Login</h2>

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Masukkan username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>

            <div class="forgot-row">
                <a href="#" class="forgot-link">Lupa kata sandi?</a>
            </div>

            <button class="btn-login">Login</button>

            <div class="divider"><span>atau</span></div>

            <button class="btn-google">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Login dengan Google
            </button>

            <p class="register-row">
                Belum punya akun? <a href="#" class="register-link">Daftar sini</a>
            </p>

        </div>
    </div>

</div>

</body>
</html>
